worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 50M;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # DNS interno do Docker — força o nginx a re-resolver os IPs dos
    # containers a cada request. Sem isso, recriar backend/frontend
    # (docker compose up --build) gera 502 até reiniciar o nginx.
    resolver 127.0.0.11 valid=10s ipv6=off;

    server {
        listen 80;
        server_name _;

        # Health check
        location = /health {
            set $backend_host backend;
            proxy_pass http://$backend_host:8000;
            include /etc/nginx/proxy_params.conf;
            access_log off;
        }

        # WebSocket — notificações e outros WS dentro da API
        location ~ ^/api/.*/ws$ {
            set $backend_ws backend;
            proxy_pass http://$backend_ws:8000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400;
        }

        # Backend API (REST)
        location /api/ {
            set $backend_host backend;
            proxy_pass http://$backend_host:8000;
            include /etc/nginx/proxy_params.conf;
        }

        # WebSocket legado (path /ws/)
        location /ws/ {
            set $backend_ws backend;
            proxy_pass http://$backend_ws:8000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400;
        }

        # API docs (dev only)
        location /docs {
            set $backend_docs backend;
            proxy_pass http://$backend_docs:8000;
            include /etc/nginx/proxy_params.conf;
        }

        location /redoc {
            set $backend_redoc backend;
            proxy_pass http://$backend_redoc:8000;
            include /etc/nginx/proxy_params.conf;
        }

        location /openapi.json {
            set $backend_oas backend;
            proxy_pass http://$backend_oas:8000;
            include /etc/nginx/proxy_params.conf;
        }

        # Frontend
        location / {
            set $frontend_host frontend;
            proxy_pass http://$frontend_host:3000;
            include /etc/nginx/proxy_params.conf;

            # SPA fallback
            proxy_intercept_errors on;
            error_page 404 = /index.html;
        }
    }
}
