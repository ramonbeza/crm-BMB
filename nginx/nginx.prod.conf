worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ──────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time';
    access_log /var/log/nginx/access.log main buffer=16k;
    error_log  /var/log/nginx/error.log warn;

    # ── Performance ──────────────────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    client_max_body_size 50M;
    server_tokens off;

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain text/css text/xml
        application/json application/javascript application/xml+rss
        application/atom+xml image/svg+xml;

    # ── Rate limiting ─────────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
    limit_conn_zone $binary_remote_addr zone=perip:10m;

    # ── DNS interno Docker ────────────────────────────────────────────────────
    resolver 127.0.0.11 valid=10s ipv6=off;

    # ── SSL config global ─────────────────────────────────────────────────────
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_session_cache shared:SSL:50m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    # ── HTTP → HTTPS redirect + ACME challenge ────────────────────────────────
    server {
        listen 80;
        listen [::]:80;
        server_name _;

        # Let's Encrypt webroot challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect all other traffic to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS principal ───────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name NGINX_DOMAIN;

        ssl_certificate     /etc/letsencrypt/live/NGINX_DOMAIN/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/NGINX_DOMAIN/privkey.pem;
        ssl_trusted_certificate /etc/letsencrypt/live/NGINX_DOMAIN/chain.pem;

        # ── Security headers ─────────────────────────────────────────────────
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options SAMEORIGIN always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # ── Auth endpoints — rate limit apertado ─────────────────────────────
        location /api/v1/auth/login {
            limit_req zone=login burst=10 nodelay;
            limit_req_status 429;

            set $backend_host backend;
            proxy_pass http://$backend_host:8000;
            include /etc/nginx/proxy_params.conf;
        }

        # ── Backend API ───────────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=50 nodelay;
            limit_conn perip 20;

            set $backend_host backend;
            proxy_pass http://$backend_host:8000;
            include /etc/nginx/proxy_params.conf;
        }

        # ── WebSocket ────────────────────────────────────────────────────────
        location /ws/ {
            set $backend_ws backend;
            proxy_pass http://$backend_ws:8000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400;
        }

        # ── Docs (desativado em produção) ─────────────────────────────────────
        location ~ ^/(docs|redoc|openapi\.json) {
            return 403 "API docs disabled in production";
        }

        # ── Frontend SPA ──────────────────────────────────────────────────────
        location / {
            set $frontend_host frontend;
            proxy_pass http://$frontend_host:3000;
            include /etc/nginx/proxy_params.conf;

            # SPA fallback
            proxy_intercept_errors on;
            error_page 404 = @spa_fallback;
        }

        location @spa_fallback {
            set $frontend_host frontend;
            proxy_pass http://$frontend_host:3000/index.html;
            include /etc/nginx/proxy_params.conf;
        }

        # ── Health check público ──────────────────────────────────────────────
        location = /health {
            set $backend_host backend;
            proxy_pass http://$backend_host:8000;
            access_log off;
            include /etc/nginx/proxy_params.conf;
        }
    }
}
